name: Feature request
description: Suggest a new feature or improvement.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need or gap does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: audience
    attributes:
      label: Who benefits most?
      options:
        - SMEs (Jua Kali, small shops)
        - Students / job-seekers
        - Schools / training programs
        - NGOs / churches
        - Developers / self-hosters
        - Everyone
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: Kenya-specific (KRA, M-Pesa, Swahili, etc.)
        - label: Would need a new template
        - label: Backend change
        - label: Editor (frontend) change
